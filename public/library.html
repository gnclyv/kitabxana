<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitabxanam — Vərəq</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .topbar { display: flex; align-items: center; gap: 16px; padding: 26px 0 10px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 220px; position: relative; }
  .search-box input {
    width: 100%; padding: 13px 16px 13px 42px; border-radius: 10px;
    background: rgba(0,0,0,0.28); border: 1px solid var(--line); color: var(--cream); font-size: 14.5px;
  }
  .search-box input:focus { outline: none; border-color: var(--gold); }
  .search-box::before { content: '🔍'; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.6; font-size: 14px; }
  .cat-select { padding: 13px 14px; border-radius: 10px; background: rgba(0,0,0,0.28); border: 1px solid var(--line); color: var(--cream); font-size: 14px; }
  .user-chip { display: flex; align-items: center; gap: 10px; padding: 6px 14px 6px 6px; border-radius: 30px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); position: relative; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #1a1408; }
  .user-menu-btn { background: none; border: none; color: var(--cream); font-size: 13px; font-weight: 600; }
  .user-dropdown {
    position: absolute; top: 52px; right: 0; width: 170px; padding: 8px;
    display: none; z-index: 50; animation: fadeSlide .2s ease;
  }
  .user-dropdown.open { display: block; }
  .user-dropdown button { width: 100%; text-align: left; padding: 10px 12px; background: none; border: none; color: var(--cream); border-radius: 7px; font-size: 13.5px; }
  .user-dropdown button:hover { background: rgba(242,233,216,0.06); }

  .hero-strip { padding: 6px 0 26px; }
  .hero-strip h1 { font-family: var(--serif); font-size: 32px; margin: 4px 0 4px; }
  .hero-strip p { color: var(--cream-dim); margin: 0; font-size: 14.5px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 26px; padding: 10px 0 80px; }
  .book-card {
    position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--line);
    background: var(--bg-panel); opacity: 0; transform: translateY(18px) scale(0.98);
    animation: cardIn .55s cubic-bezier(.2,.8,.2,1) forwards;
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease, border-color .35s ease;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }
  .book-card:hover { transform: translateY(-8px) rotateZ(-0.4deg); box-shadow: 0 22px 44px rgba(0,0,0,0.45); border-color: rgba(201,162,39,0.35); }
  .cover {
    height: 220px; display: flex; align-items: flex-end; padding: 16px; position: relative; overflow: hidden;
  }
  .cover::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.55)); }
  .cover .cat-tag {
    position: absolute; top: 12px; left: 12px; font-size: 10.5px; letter-spacing: 0.5px; text-transform: uppercase;
    background: rgba(0,0,0,0.35); padding: 5px 10px; border-radius: 20px; z-index: 2; font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .cover .glyph { font-family: var(--serif); font-size: 40px; z-index: 2; color: rgba(255,255,255,0.92); font-weight: 600; line-height: 1.15; }
  .card-body { padding: 16px; }
  .card-body h3 { font-family: var(--serif); font-size: 16.5px; margin: 0 0 4px; line-height: 1.3; }
  .card-body .author { font-size: 12.5px; color: var(--cream-dim); margin-bottom: 10px; }
  .card-body .desc { font-size: 12.5px; color: var(--cream-dim); line-height: 1.5; margin-bottom: 12px; min-height: 34px; opacity: 0.85; }
  .card-actions { display: flex; gap: 8px; }
  .icon-btn {
    flex: 1; padding: 9px; border-radius: 8px; border: 1px solid var(--line); background: rgba(255,255,255,0.03);
    color: var(--cream); font-size: 12.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background .2s, transform .2s;
  }
  .icon-btn:hover { background: rgba(201,162,39,0.15); transform: translateY(-1px); }
  .icon-btn.del { flex: 0 0 auto; width: 38px; color: #e08a8a; }
  .icon-btn.del:hover { background: rgba(168,50,50,0.2); }
  .meta-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--cream-dim); padding: 0 16px 14px; opacity: 0.7; }

  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-state .ic { font-size: 52px; margin-bottom: 16px; animation: bookFloat2 3s ease-in-out infinite; }
  @keyframes bookFloat2 { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
  .empty-state h3 { font-family: var(--serif); font-size: 22px; margin: 0 0 8px; }
  .empty-state p { color: var(--cream-dim); margin: 0 0 22px; }

  .skeleton { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 26px; padding: 10px 0; }
  .skel-card { height: 320px; border-radius: 12px; background: linear-gradient(90deg, var(--bg-panel) 25%, var(--bg-panel-2) 50%, var(--bg-panel) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-overlay.open { display: flex; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 480px; max-width: 100%; max-height: 88vh; overflow-y: auto; padding: 32px;
    animation: modalIn .35s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-head h2 { font-family: var(--serif); font-size: 22px; margin: 0; }
  .close-btn { background: none; border: none; color: var(--cream-dim); font-size: 20px; }
  .drop-zone {
    border: 2px dashed var(--line); border-radius: 12px; padding: 28px 16px; text-align: center;
    margin-bottom: 20px; cursor: pointer; transition: border-color .25s, background .25s;
  }
  .drop-zone.drag { border-color: var(--gold); background: rgba(201,162,39,0.08); }
  .drop-zone .dz-ic { font-size: 30px; margin-bottom: 8px; }
  .drop-zone .dz-text { font-size: 13.5px; color: var(--cream-dim); }
  .drop-zone .dz-file { font-size: 13px; color: var(--gold-bright); font-weight: 600; margin-top: 6px; }
  .progress-wrap { height: 8px; border-radius: 6px; background: rgba(0,0,0,0.3); overflow: hidden; margin-top: 16px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); transition: width .2s ease; border-radius: 6px; }

  @media (max-width: 640px) {
    .topbar { flex-direction: column; align-items: stretch; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
    .cover { height: 170px; }
  }
</style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <nav class="nav">
    <div class="brand"><span class="brand-mark">📖</span> Vərəq</div>
    <div class="nav-right">
      <button class="btn btn-primary" onclick="openModal()">＋ Kitab yüklə</button>
      <div class="user-chip" id="userChip" onclick="toggleUserMenu()">
        <div class="avatar" id="avatar">?</div>
        <button class="user-menu-btn" id="usernameLabel">...</button>
        <div class="panel user-dropdown" id="userDropdown">
          <button onclick="logout()">Çıxış et</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="hero-strip">
      <h1>Xoş gəldin, <span id="greetName">oxucu</span> 👋</h1>
      <p>Kitabxanadakı bütün kitablara bax, öz kitablarını əlavə et.</p>
    </div>

    <div class="topbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Kitab adı və ya müəllif üzrə axtar...">
      </div>
      <select class="cat-select" id="categorySelect">
        <option>Hamısı</option>
        <option>Bədii ədəbiyyat</option>
        <option>Elmi</option>
        <option>Tarix</option>
        <option>Psixologiya</option>
        <option>Biznes</option>
        <option>Uşaq ədəbiyyatı</option>
        <option>Digər</option>
      </select>
    </div>

    <div id="skeletonGrid" class="skeleton">
      <div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div>
    </div>
    <div id="bookGrid" class="grid" style="display:none;"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="ic">📚</div>
      <h3>Hələ kitab yoxdur</h3>
      <p>İlk kitabı yükləyən sən ol!</p>
      <button class="btn btn-primary" onclick="openModal()">＋ Kitab yüklə</button>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="panel modal">
      <div class="modal-head">
        <h2>Yeni kitab yüklə</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="uploadForm">
        <div class="drop-zone" id="dropZone">
          <div class="dz-ic">📄</div>
          <div class="dz-text">PDF faylı bura sürükləyin və ya klikləyin</div>
          <div class="dz-file" id="dzFile"></div>
          <input type="file" id="pdfInput" accept="application/pdf,.pdf" style="display:none;">
        </div>
        <div class="field">
          <label>Kitabın adı</label>
          <input type="text" name="title" required id="titleInput">
        </div>
        <div class="field">
          <label>Müəllif</label>
          <input type="text" name="author" required id="authorInput">
        </div>
        <div class="field">
          <label>Kateqoriya</label>
          <select name="category" id="categoryInput">
            <option>Bədii ədəbiyyat</option>
            <option>Elmi</option>
            <option>Tarix</option>
            <option>Psixologiya</option>
            <option>Biznes</option>
            <option>Uşaq ədəbiyyatı</option>
            <option>Digər</option>
          </select>
        </div>
        <div class="field">
          <label>Qısa təsvir (istəyə bağlı)</label>
          <textarea name="description" id="descInput" placeholder="Kitab haqqında bir neçə cümlə..."></textarea>
        </div>
        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <button class="btn btn-primary full-btn" type="submit" id="uploadBtn">
          <span class="btn-label">Yüklə</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/library.js"></script>
</body>
</html>
